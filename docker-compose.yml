version: "3.9"

services:

  eagleeye:

    build: .

    container_name: eagleeye

    restart: always

    environment:
      - PORT=3001
      - AWS_REGION=ap-south-1

    ports:
      - "3001:3001"

  nginx:

    image: nginx:latest

    container_name: eagleeye-nginx

    restart: always

    ports:
      - "80:80"

    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf

    depends_on:
      - eagleeye